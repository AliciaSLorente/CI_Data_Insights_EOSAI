<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 170" width="520" height="170">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F4A726;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#F4A726;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4C9BE8;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4C9BE8;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="170" fill="#0B1628" rx="14"/>

  <!-- ── SYMBOL: Knowledge Graph forming a rising sun ── -->

  <!-- Horizon line -->
  <line x1="38" y1="118" x2="168" y2="118" stroke="#4C9BE8" stroke-width="1" opacity="0.35"/>

  <!-- Sun arc -->
  <path d="M 46 118 A 57 57 0 0 1 158 118"
        fill="none" stroke="#F4A726" stroke-width="1.8" opacity="0.55"/>

  <!-- Graph edges -->
  <line x1="102" y1="62" x2="68" y2="91"  stroke="#4C9BE8" stroke-width="1.6" opacity="0.85"/>
  <line x1="102" y1="62" x2="136" y2="91" stroke="#4C9BE8" stroke-width="1.6" opacity="0.85"/>
  <line x1="68"  y1="91" x2="46"  y2="118" stroke="#4C9BE8" stroke-width="1.4" opacity="0.7"/>
  <line x1="136" y1="91" x2="158" y2="118" stroke="#4C9BE8" stroke-width="1.4" opacity="0.7"/>
  <line x1="68"  y1="91" x2="102" y2="118" stroke="#4C9BE8" stroke-width="1.1" opacity="0.5"/>
  <line x1="136" y1="91" x2="102" y2="118" stroke="#4C9BE8" stroke-width="1.1" opacity="0.5"/>
  <line x1="46"  y1="118" x2="102" y2="118" stroke="#4C9BE8" stroke-width="1"   opacity="0.35"/>
  <line x1="102" y1="118" x2="158" y2="118" stroke="#4C9BE8" stroke-width="1"   opacity="0.35"/>

  <!-- Dawn rays from sun node -->
  <line x1="102" y1="62" x2="102" y2="32" stroke="#F4A726" stroke-width="1.5" opacity="0.5"/>
  <line x1="102" y1="62" x2="76"  y2="40" stroke="#F4A726" stroke-width="1"   opacity="0.35"/>
  <line x1="102" y1="62" x2="128" y2="40" stroke="#F4A726" stroke-width="1"   opacity="0.35"/>

  <!-- Ray tip nodes -->
  <circle cx="102" cy="32" r="2.5" fill="#F4A726" opacity="0.65"/>
  <circle cx="76"  cy="40" r="2"   fill="#F4A726" opacity="0.4"/>
  <circle cx="128" cy="40" r="2"   fill="#F4A726" opacity="0.4"/>

  <!-- Graph nodes — horizon -->
  <circle cx="46"  cy="118" r="4"   fill="#4C9BE8" filter="url(#glow)"/>
  <circle cx="158" cy="118" r="4"   fill="#4C9BE8" filter="url(#glow)"/>
  <circle cx="102" cy="118" r="3.5" fill="#4C9BE8" opacity="0.7"/>

  <!-- Graph nodes — mid arc -->
  <circle cx="68"  cy="91" r="5" fill="#F4A726" opacity="0.85"/>
  <circle cx="136" cy="91" r="5" fill="#F4A726" opacity="0.85"/>

  <!-- Sun node — apex (brightest) -->
  <circle cx="102" cy="62" r="20" fill="url(#sunGlow)"/>
  <circle cx="102" cy="62" r="9"  fill="#F4A726" opacity="0.12"/>
  <circle cx="102" cy="62" r="7"  fill="#F4A726" filter="url(#glow)"/>

  <!-- ── DIVIDER ── -->
  <line x1="200" y1="28" x2="200" y2="138"
        stroke="#4C9BE8" stroke-width="0.6" opacity="0.28"/>

  <!-- ── TYPOGRAPHY ── -->
  <!-- EOS -->
  <text x="222" y="108"
        font-family="Palatino Linotype, Palatino, Georgia, serif"
        font-size="62"
        font-weight="bold"
        fill="#F4A726"
        letter-spacing="8"
        filter="url(#glow)">EOS</text>

  <!-- AI -->
  <text x="390" y="108"
        font-family="Palatino Linotype, Palatino, Georgia, serif"
        font-size="44"
        fill="white"
        opacity="0.92">AI</text>

  <!-- Gold separator line -->
  <line x1="222" y1="116" x2="448" y2="116"
        stroke="#F4A726" stroke-width="0.7" opacity="0.38"/>

  <!-- Tagline -->
  <text x="222" y="136"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11"
        fill="#4C9BE8"
        letter-spacing="4.5"
        opacity="0.88">UW  INTELLIGENCE</text>
</svg>
